<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Cursos</title>
</head>

<body>

    <a href="/">Voltar para a página inicial</a>

    <h1 style="text-align: center;">Listagem de Cursos</h1>
    <h3 style="text-align: center;">
        <a href="/cursos/criar">Criar Novo Curso</a>
    </h3>

    <table align="center" border="1">
        <tr>
            <th>Nome</th>
            <th>Período</th>
            <th>Carga Horária</th>
            <th colspan="2">Ações</th>
        </tr>
        <tr th:each="curso : ${cursos}">
            <td th:text="${curso.nomeCurso}">*</td>
            <td th:text="${curso.periodoCurso}">*</td>
            <td th:text="${curso.cargahorariaCurso}">*</td>
            <td>
                <a th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}">Editar</a>
                <a th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}">Excluir</a>
            </td>
        </tr>
    </table>

</body>

</html>
