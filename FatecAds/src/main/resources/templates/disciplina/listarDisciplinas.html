<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Disciplinas</title>
</head>

<body>

    <a href="/">Voltar para a página inicial</a>

    <h1 style="text-align: center;">Listagem de Disciplinas</h1>
    <h3 style="text-align: center;">
        <a href="/disciplinas/criar">Criar Nova Disciplina</a>
    </h3>

    <table align="center" border="1">
        <tr>
            <th>Nome</th>
            <th>Sigla</th>
            <th>Carga Horária</th>
            <th colspan="2">Ações</th>
        </tr>
        <tr th:each="disciplina : ${disciplinas}">
            <td th:text="${disciplina.nomeDisciplina}">*</td>
            <td th:text="${disciplina.siglaDisciplina}">*</td>
            <td th:text="${disciplina.cargahorariaDisciplina}">*</td>
            <td>
                <a th:href="@{/disciplinas/editar/{id}(id=${disciplina.idDisciplina})}">Editar</a>
                <a th:href="@{/disciplinas/excluir/{id}(id=${disciplina.idDisciplina})}">Excluir</a>
            </td>
        </tr>
    </table>

</body>

</html>
