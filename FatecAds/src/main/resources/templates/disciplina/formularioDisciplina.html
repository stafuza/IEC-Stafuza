<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Disciplinas</title>
</head>
<body>

    <a href="/">Voltar para a página inicial</a>

    <h1 style="text-align: center;">Cadastro de Disciplinas</h1>
    <form th:action="@{/disciplinas/salvar}" th:object="${disciplina}" method="post">

        <input type="hidden" th:field="*{idDisciplina}" />

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nomeDisciplina}" />
        <br />

        <label for="sigla">Sigla:</label>
        <input type="text" id="sigla" th:field="*{siglaDisciplina}" />
        <br />

        <label for="cargahoraria">Carga Horária:</label>
        <input type="number" id="cargahoraria" th:field="*{cargahorariaDisciplina}" />
        <br />

        <button type="submit">Salvar</button>
    </form>

</body>
</html>
